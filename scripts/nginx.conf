# /etc/nginx/sites-available/research_army
# Reverse proxy + WebSocket support

server {
    listen 80;
    server_name _;  # replace with your domain or EC2 public IP

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    client_max_body_size 50M;

    # ── Main API + UI ──────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Timeouts for long-running research queries
        proxy_read_timeout    600;
        proxy_connect_timeout 60;
        proxy_send_timeout    600;
    }

    # ── WebSocket ──────────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;

        proxy_read_timeout  3600;
        proxy_send_timeout  3600;
    }

    # ── Ollama (local access only, remove for production) ──────────────────
    location /ollama/ {
        allow 127.0.0.1;
        deny  all;
        proxy_pass http://127.0.0.1:11434/;
    }
}
